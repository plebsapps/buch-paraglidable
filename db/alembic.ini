# Alembic-Konfiguration (Etappe E). Die Verbindungs-URL kommt ausschließlich
# aus der Umgebung (PARAGLIDABLE_DB_URL, siehe env.py) — keine Zugangsdaten
# in dieser Datei.
[alembic]
script_location = %(here)s
version_locations = %(here)s/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
