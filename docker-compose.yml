# Docker Compose of the target architecture (docs/plan.md). Grows stage by
# stage: web (D2, replaces Apache/PHP), worker (D3), postgres (E).
# The frozen legacy container (docker/Dockerfile) keeps running alongside
# until each stage's replacement is verified and switched over.
services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: paraglidable-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8007:8000"
    environment:
      # Etappe E: Migrationen (alembic) und DB-Leser laufen im web-Image
      - PARAGLIDABLE_DB_URL=postgresql://paraglidable:${POSTGRES_PASSWORD:?}@db:5432/paraglidable
    volumes:
      - ./web:/app/web:ro
      - ./www:/app/www:ro
      # Etappe E: Alembic-Migrationen (docker compose run --rm web alembic ...)
      - ./db:/app/db:ro
      # www/data/elevation is a relative symlink into tiler/_cache
      - ./tiler/_cache/elevation:/app/tiler/_cache/elevation:ro

  # Etappe E: PostgreSQL für Läufe, Zellen-/Spot-Ergebnisse und API-Schlüssel.
  # Große Binärdaten (GRIBs, Kacheln) bleiben bewusst dateibasiert (docs/plan.md).
  # Kein Host-Port: erreichbar nur im Compose-Netz. Speicher eng konfiguriert —
  # der Server hat 1,8 GB RAM (docs/deployment.md).
  db:
    image: postgis/postgis@sha256:44126d872ac91993766c341e369c539e8196614321765d36a6f1bab0419a5fa5 # postgis/postgis:16-3.4
    container_name: paraglidable-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=paraglidable
      - POSTGRES_USER=paraglidable
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD in .env setzen (.env.example)}
    command: >
      postgres -c shared_buffers=64MB
               -c effective_cache_size=192MB
               -c maintenance_work_mem=32MB
               -c work_mem=4MB
               -c max_connections=20
    mem_limit: 384m
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paraglidable -d paraglidable"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: paraglidable-worker
    restart: unless-stopped
    environment:
      - TZ=Europe/Zurich
      # Etappe F: keine eingebrannten Küstenlinien in den Produktions-
      # Kacheln (GM-Läufe laufen ohne diese Variable -> Verhalten dort
      # unverändert, Referenz bleibt gültig)
      - PARAGLIDABLE_DRAW_BORDERS=0
    volumes:
      - .:/workspaces/Paraglidable

volumes:
  pg-data:
